version: "3"

env:
  BIN_DIR: "{{.HOME}}/perl/bin"
  INSTALL_DIR: "{{.HOME}}/perl"

tasks:
  default:
    deps:
      - rename

  rename:
    desc: >
      Cpan File::Rename.
    summary: |
      Cpan File::Rename.

      [rename](https://metacpan.org/dist/File-Rename/view/rename.PL)
    cmd: cpan install File::Rename
    generates:
      - "{{.BIN_DIR}}/rename"
    status:
      - command -v rename
