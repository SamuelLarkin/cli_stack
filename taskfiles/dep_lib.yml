version: "3"

env:
  BASH_COMPLETION_D: "{{.HOME}}/.local/share/bash-completion/completions"
  BIN_DIR: "{{.HOME}}/.local/bin"
  INSTALL_DIR: "{{.HOME}}/.local"

tasks:
  libevent:
    desc: >
      The libevent API provides a mechanism to execute a callback function when
      a specific event occurs on a file descriptor or after a timeout has been
      reached. Furthermore, libevent also support callbacks due to signals or
      regular timeouts.
    summary: |
      The libevent API provides a mechanism to execute a callback function when
      a specific event occurs on a file descriptor or after a timeout has been
      reached. Furthermore, libevent also support callbacks due to signals or
      regular timeouts.

      [libevent](https://libevent.org/)
    cmds:
      - |
        latest_version_url=$(curl -s "$LATEST_INFO_URL" | jq -r '.tarball_url')
        curl \
          --create-dirs --fail --location \
          --output $TARBALL \
          "$latest_version_url"
      - defer: rm $TARBALL
      - mkdir -p libevent
      - defer: rm -fr libevent
      - tar xf $TARBALL --directory=libevent --strip-components=1
      - |
        cd libevent
        ./configure --prefix="{{.INSTALL_DIR}}" --enable-shared
        \make -j $(nproc) install
    dir: "{{.HOME}}/tmp"
    env:
      LATEST_INFO_URL: https://api.github.com/repos/libevent/libevent/releases/latest
      TARBALL: libevent.tar.gz
    preconditions:
      - msg: "make must be in your $PATH"
        sh: command -v make

  ncurses:
    desc: >
      [ncurses](https://invisible-island.net/ncurses/)
    summary: |
      [ncurses](https://invisible-island.net/ncurses/)
    cmds:
      - |
        curl \
          --create-dirs --fail --location \
          --output $TARBALL \
          "https://ftp.gnu.org/gnu/ncurses/ncurses-$VERSION.tar.gz"
      - defer: rm $TARBALL
      - mkdir -p ncurses
      - defer: rm -fr ncurses
      - tar xf $TARBALL --directory=ncurses --strip-components=1
      - |
        cd ncurses
        ./configure --prefix="{{.INSTALL_DIR}}" --with-shared --with-termlib --enable-pc-files --with-pkg-config-libdir={{.INSTALL_DIR}}/lib/pkgconfig
        \make -j $(nproc) install
    dir: "{{.HOME}}/tmp"
    env:
      TARBALL: ncurses.tar.gz
      VERSION: 6.6
    preconditions:
      - msg: "make must be in your $PATH"
        sh: command -v make

